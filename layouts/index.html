<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>EduPlus</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        background: #f3f4f6;
      }

      header {
        background: #111827;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        flex-wrap: wrap;
      }

      .logo {
        font-size: 20px;
        font-weight: bold;
      }

      nav {
        display: flex;
        gap: 15px;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-size: 14px;
      }

      .container {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }

      .slider {
        height: 260px;
        background: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        border-radius: 10px;
        margin-bottom: 30px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      footer {
        margin-top: 40px;
        background: #111827;
        color: white;
        text-align: center;
        padding: 20px;
      }

      /* планшет */

      @media (max-width: 768px) {
        .cards {
          grid-template-columns: 1fr 1fr;
        }
      }

      /* мобильный 390px */

      @media (max-width: 390px) {
        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        nav {
          flex-wrap: wrap;
          gap: 10px;
        }

        .slider {
          height: 160px;
          font-size: 18px;
        }

        .cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">EduPlus</div>

      <nav>
        <a href="login.html">Вход</a>
        <a href="register.html">Регистрация</a>
        <a href="requests.html">Заявки</a>
      </nav>
    </header>

    <div class="container">
      <div class="slider">Слайдер курсов</div>

      <h2 style="margin-bottom: 20px">Популярные курсы</h2>

      <div class="cards">
        <div class="card">
          <h3>Web разработка</h3>
          <p>Современные технологии разработки сайтов.</p>
        </div>

        <div class="card">
          <h3>UI / UX дизайн</h3>
          <p>Проектирование интерфейсов.</p>
        </div>

        <div class="card">
          <h3>Data Science</h3>
          <p>Аналитика и работа с данными.</p>
        </div>
      </div>
    </div>

    <footer>© EduPlus 2026</footer>
  </body>
</html>
