<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Админ панель</title>

    <style>
      body {
        font-family: Arial;
        background: #f3f4f6;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        padding: 20px;
      }

      table {
        width: 100%;
        background: white;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: left;
      }

      button {
        padding: 6px 10px;
      }

      @media (max-width: 390px) {
        table {
          font-size: 12px;
        }

        th,
        td {
          padding: 8px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2 style="margin-bottom: 20px">Админ панель</h2>

      <table>
        <tr>
          <th>Пользователь</th>
          <th>Курс</th>
          <th>Статус</th>
          <th>Действие</th>
        </tr>

        <tr>
          <td>Иван</td>
          <td>Web</td>
          <td>Ожидает</td>
          <td>
            <button>✔</button>
            <button>✖</button>
          </td>
        </tr>

        <tr>
          <td>Анна</td>
          <td>Data</td>
          <td>Ожидает</td>
          <td>
            <button>✔</button>
            <button>✖</button>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
