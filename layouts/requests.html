<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Заявки</title>

    <style>
      body {
        font-family: Arial;
        background: #f3f4f6;
      }

      .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
      }

      .request {
        background: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      a.button {
        display: inline-block;
        margin-top: 20px;
        background: #2563eb;
        color: white;
        padding: 10px 16px;
        text-decoration: none;
        border-radius: 6px;
      }

      @media (max-width: 390px) {
        .container {
          padding: 15px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2 style="margin-bottom: 20px">Мои заявки</h2>

      <div class="request">
        <h3>Web разработка</h3>
        <p>Статус: на рассмотрении</p>
      </div>

      <div class="request">
        <h3>Data Science</h3>
        <p>Статус: одобрено</p>
      </div>

      <a class="button" href="create-request.html">Создать заявку</a>
    </div>
  </body>
</html>
